<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lift" />
<title>Lift — Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --surface3: #27272f;
    --border: #2e2e38;
    --accent: #c8ff00;
    --accent2: #00e5ff;
    --danger: #ff4d4d;
    --text: #f0f0f0;
    --text2: #9090a0;
    --text3: #55555f;
    --radius: 12px;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overscroll-behavior: none; }
  #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }

  .page { min-height: 100vh; padding-bottom: 48px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 8px; font-family: var(--font-display); font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 15px; padding: 10px 12px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  select option { background: var(--surface2); }
  label { font-size: 12px; font-family: var(--font-display); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); display: block; margin-bottom: 5px; }

  .form-row { margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 200; display: flex; align-items: flex-end; }
  .modal-backdrop.center { align-items: center; padding: 20px; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); width: 100%; max-height: 92vh; overflow-y: auto; padding: 20px 16px 52px; }
  .modal.center-modal { border-radius: 16px; border: 1px solid var(--border); max-height: 82vh; padding: 20px 16px 28px; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 0.03em; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  .exercise-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .exercise-name { font-family: var(--font-display); font-size: 19px; font-weight: 600; letter-spacing: 0.03em; color: var(--text); }
  .exercise-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .pill { display: inline-flex; align-items: center; background: var(--surface3); border-radius: 5px; padding: 3px 7px; font-family: var(--font-mono); font-size: 11px; color: var(--text2); }
  .pill.accent { background: rgba(200,255,0,0.1); color: var(--accent); }
  .pill.info   { background: rgba(0,229,255,0.1); color: var(--accent2); }

  .stepper { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .stepper input { border: none; border-radius: 0; text-align: center; flex: 1; min-width: 0; padding: 10px 4px; }
  .stepper input:focus { border: none; }
  .stepper-btn { background: var(--surface3); border: none; color: var(--text); width: 40px; height: 42px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stepper-btn:active { background: var(--border); }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; font-family: var(--font-display); font-weight: 600; font-size: 14px; letter-spacing: 0.05em; padding: 10px 22px; border-radius: 100px; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-family: var(--font-display); font-size: 11px; letter-spacing: 0.06em; color: var(--text3); padding-bottom: 6px; font-weight: 600; }
  .cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: default; border: 1px solid transparent; transition: all 0.12s; position: relative; font-family: var(--font-mono); font-size: 13px; color: var(--text3); }
  .cal-day.has-log { color: var(--text); cursor: pointer; }
  .cal-day.has-log:hover { background: var(--surface2); border-color: var(--border); }
  .cal-day.has-log::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
  .cal-day.today { border-color: rgba(200,255,0,0.4); color: var(--accent); }
  .cal-day.today.has-log::after { background: var(--accent2); }
  .cal-day.other-month { opacity: 0.15; pointer-events: none; }

  .day-section { margin: 0 16px 20px; }
  .day-label { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); padding: 14px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag { background: var(--surface3); border-radius: 6px; padding: 4px 10px; font-family: var(--font-mono); font-size: 12px; color: var(--text2); cursor: pointer; border: 1px solid transparent; }
  .tag.selected { border-color: var(--accent); color: var(--accent); background: rgba(200,255,0,0.07); }

  .back-header { display: flex; align-items: center; gap: 12px; padding: 16px; position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 1px solid var(--border); }
  .back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0; }
  .back-header h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 0.03em; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const STORE_KEY = 'lift_data_v3';
function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } }
function save(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
const INITIAL = { routine: {}, sessions: [], targets: {}, draftSession: null };

const uuid = () => Math.random().toString(36).slice(2, 9);
const fmtShort = d => new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
const toDateStr = d => { const dt = new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; };

function greeting() {
  const h = new Date().getHours();
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
}

// ── Shared ────────────────────────────────────────────────────────────────────
function Stepper({ value, onChange, min=0, max=999, step=1 }) {
  return (
    <div className="stepper">
      <button className="stepper-btn" onClick={() => onChange(Math.max(min, +(parseFloat(value)||0).toFixed(4) - step))}>−</button>
      <input type="number" value={value} min={min} max={max} step={step} onChange={e => onChange(parseFloat(e.target.value)||0)} />
      <button className="stepper-btn" onClick={() => onChange(Math.min(max, +(parseFloat(value)||0).toFixed(4) + step))}>+</button>
    </div>
  );
}
function Toast({ msg }) { return <div className={`toast${msg?' show':''}`}>{msg}</div>; }

// ── CSV ───────────────────────────────────────────────────────────────────────
function exportCSV(data) {
  const q = v => `"${String(v).replace(/"/g,'""')}"`;
  const row = r => r.map(q).join(',');
  const rr = [row(['sheet','day_num','day_name','exercise_id','exercise_name','min_sets','max_sets','min_reps','max_reps'])];
  Object.entries(data.routine).forEach(([d,day]) => (day.exercises||[]).forEach(ex =>
    rr.push(row(['routine',d,day.name||'',ex.id,ex.name,ex.minSets,ex.maxSets,ex.minReps,ex.maxReps]))));
  const sr = [row(['sheet','session_id','date','day_num','exercise_id','sets','reps','weight_kg'])];
  data.sessions.forEach(s => (s.entries||[]).forEach(e =>
    sr.push(row(['session',s.id,s.date,s.dayNum,e.exerciseId,e.sets,e.reps,e.weight??'']))));
  const tr = [row(['sheet','exercise_id','target_sets','target_reps','target_weight_kg'])];
  Object.entries(data.targets||{}).forEach(([id,t]) =>
    tr.push(row(['target',id,t.sets??'',t.reps??'',t.weight??''])));
  const csv = [...rr,'',...sr,'',...tr].join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv],{type:'text/csv'})),
    download: `lift-${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click();
}

function parseCSV(text) {
  const blocks = text.trim().split(/\n[ \t]*\n/);
  function parseBlock(b) {
    const lines = b.trim().split('\n');
    const hdrs = lines[0].split(',').map(h=>h.replace(/^"|"$/g,''));
    return lines.slice(1).map(line => {
      const vals=[]; let cur='', inQ=false;
      for(const c of line){ if(c==='"')inQ=!inQ; else if(c===','&&!inQ){vals.push(cur);cur='';}else cur+=c; }
      vals.push(cur);
      return Object.fromEntries(hdrs.map((h,i)=>[h,vals[i]??'']));
    });
  }
  const [b0,b1,b2] = blocks;
  const rr=b0?parseBlock(b0):[], sr=b1?parseBlock(b1):[], tr=b2?parseBlock(b2):[];
  const routine={};
  rr.filter(r=>r.sheet==='routine').forEach(r=>{
    if(!routine[r.day_num])routine[r.day_num]={name:r.day_name,exercises:[]};
    routine[r.day_num].exercises.push({id:r.exercise_id,name:r.exercise_name,minSets:+r.min_sets,maxSets:+r.max_sets,minReps:+r.min_reps,maxReps:+r.max_reps});
  });
  const sm={};
  sr.filter(r=>r.sheet==='session').forEach(r=>{
    if(!sm[r.session_id])sm[r.session_id]={id:r.session_id,date:r.date,dayNum:r.day_num,entries:[]};
    sm[r.session_id].entries.push({exerciseId:r.exercise_id,sets:+r.sets,reps:+r.reps,weight:r.weight_kg!==''?+r.weight_kg:0});
  });
  const targets={};
  tr.filter(r=>r.sheet==='target').forEach(r=>{
    targets[r.exercise_id]={sets:r.target_sets!==''?+r.target_sets:undefined,reps:r.target_reps!==''?+r.target_reps:undefined,weight:r.target_weight_kg!==''?+r.target_weight_kg:undefined};
  });
  return {routine,sessions:Object.values(sm),targets};
}

// ══════════════════════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [data, setData] = useState(() => ({...INITIAL,...load()}));
  const [page, setPage] = useState('home');
  const [toast, setToast] = useState('');
  const timer = useRef();
  const persist = useCallback(d => { setData(d); save(d); }, []);
  function showToast(msg) { clearTimeout(timer.current); setToast(msg); timer.current = setTimeout(()=>setToast(''),2400); }
  return (
    <div>
      {page==='home'    && <HomePage    data={data} persist={persist} showToast={showToast} goRoutine={()=>setPage('routine')} />}
      {page==='routine' && <RoutinePage data={data} persist={persist} showToast={showToast} goBack={()=>setPage('home')} />}
      <Toast msg={toast} />
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// HOME PAGE
// ══════════════════════════════════════════════════════════════════════════════
function HomePage({ data, persist, showToast, goRoutine }) {
  const [workoutOpen, setWorkoutOpen] = useState(false);
  const [dayPickOpen, setDayPickOpen] = useState(false);
  const [calModal, setCalModal]       = useState(null); // YYYY-MM-DD string
  const [dataModal, setDataModal]     = useState(false);

  const now = new Date();
  const todayStr = toDateStr(now);
  const [calYear,  setCalYear]  = useState(now.getFullYear());
  const [calMonth, setCalMonth] = useState(now.getMonth());

  const dayNums = Object.keys(data.routine).sort();
  const hasDraft = !!data.draftSession;

  const sessionsByDate = useMemo(() => {
    const m = {};
    data.sessions.forEach(s => { const d = toDateStr(s.date); if(!m[d])m[d]=[]; m[d].push(s); });
    return m;
  }, [data.sessions]);

  function getLatest(exerciseId, dayNum) {
    for (let i = data.sessions.length-1; i >= 0; i--) {
      const s = data.sessions[i];
      if (String(s.dayNum)===String(dayNum)) {
        const e = s.entries?.find(e=>e.exerciseId===exerciseId);
        if (e) return {...e, date:s.date};
      }
    }
    return null;
  }

  function startDraft(dayNum) {
    const exs = data.routine[dayNum]?.exercises || [];
    const entries = exs.map(ex => {
      const prev = getLatest(ex.id, dayNum);
      const t = data.targets[ex.id]||{};
      return { exerciseId:ex.id, sets:t.sets??prev?.sets??ex.minSets, reps:t.reps??prev?.reps??ex.minReps, weight:t.weight??prev?.weight??0 };
    });
    persist({...data, draftSession:{dayNum, entries}});
    setDayPickOpen(false);
    setWorkoutOpen(true);
  }

  function handleLogClick() {
    if (hasDraft) { setWorkoutOpen(true); return; }
    if (!dayNums.length) { showToast('Set up your routine first'); goRoutine(); return; }
    if (dayNums.length===1) { startDraft(dayNums[0]); }
    else setDayPickOpen(true);
  }

  function updateDraftEntry(exerciseId, field, val) {
    const entries = data.draftSession.entries.map(e => e.exerciseId===exerciseId ? {...e,[field]:val} : e);
    persist({...data, draftSession:{...data.draftSession, entries}});
  }

  function commitSession() {
    const session = {id:uuid(), date:new Date().toISOString(), dayNum:data.draftSession.dayNum, entries:data.draftSession.entries};
    persist({...data, sessions:[...data.sessions, session], draftSession:null});
    setWorkoutOpen(false);
    showToast('Workout saved!');
  }

  function discardDraft() {
    persist({...data, draftSession:null});
    setWorkoutOpen(false);
  }

  // Calendar
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  function calDays() {
    const firstDow = new Date(calYear, calMonth, 1).getDay();
    const offset   = (firstDow + 6) % 7; // Mon=0
    const dInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const dInPrev  = new Date(calYear, calMonth, 0).getDate();
    const cells = [];
    for (let i=0;i<offset;i++) cells.push({d:dInPrev-offset+1+i, cur:false});
    for (let d=1;d<=dInMonth;d++) cells.push({d, cur:true});
    while (cells.length%7!==0) cells.push({d:cells.length-offset-dInMonth+1, cur:false});
    return cells;
  }
  function prevMonth() { if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); }
  function nextMonth() { if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); }

  return (
    <div className="page">
      {/* ── Header ── */}
      <div style={{padding:'36px 20px 20px', display:'flex', alignItems:'flex-start', justifyContent:'space-between'}}>
        <div>
          <div style={{fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text3)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6}}>
            {now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}
          </div>
          <h1 style={{fontFamily:'var(--font-display)', fontSize:38, fontWeight:700, letterSpacing:'0.01em', lineHeight:1.1}}>
            {greeting()},<br/><span style={{color:'var(--accent)'}}>Nico.</span>
          </h1>
        </div>
        <button className="btn btn-ghost btn-sm" style={{marginTop:4}} onClick={()=>setDataModal(true)} title="Backup">⇅</button>
      </div>

      {/* ── Draft banner ── */}
      {hasDraft && (
        <div style={{margin:'0 16px 16px', padding:'12px 14px', background:'rgba(200,255,0,0.06)', border:'1px solid rgba(200,255,0,0.22)', borderRadius:10, display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
          <div>
            <div style={{fontFamily:'var(--font-display)', fontWeight:700, fontSize:13, color:'var(--accent)', letterSpacing:'0.06em'}}>WORKOUT IN PROGRESS</div>
            <div style={{fontSize:13, color:'var(--text2)', marginTop:2}}>
              Day {data.draftSession.dayNum}{data.routine[data.draftSession.dayNum]?.name ? ` · ${data.routine[data.draftSession.dayNum].name}` : ''}
            </div>
          </div>
          <button className="btn btn-accent btn-sm" onClick={()=>setWorkoutOpen(true)}>Resume</button>
        </div>
      )}

      {/* ── Action buttons ── */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, padding:'0 16px 28px'}}>
        {[
          { icon:'🏋️', label: hasDraft ? 'Continue\nWorkout' : 'Log a\nWorkout', action: handleLogClick, accent: true },
          { icon:'📋', label:'My\nRoutine', action: goRoutine, accent: false },
        ].map(({icon,label,action,accent}) => (
          <button key={label} onClick={action} style={{
            background: accent ? 'var(--accent)' : 'var(--surface)',
            color: accent ? '#000' : 'var(--text)',
            border: accent ? 'none' : '1px solid var(--border)',
            borderRadius:14, padding:'20px 12px', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:8,
            transition:'transform 0.12s',
          }}
          onMouseDown={e=>e.currentTarget.style.transform='scale(0.97)'}
          onMouseUp={e=>e.currentTarget.style.transform=''}
          onTouchStart={e=>e.currentTarget.style.transform='scale(0.97)'}
          onTouchEnd={e=>e.currentTarget.style.transform=''}>
            <span style={{fontSize:28}}>{icon}</span>
            <span style={{fontFamily:'var(--font-display)', fontWeight:700, fontSize:15, letterSpacing:'0.04em', textAlign:'center', textTransform:'uppercase', whiteSpace:'pre-line', lineHeight:1.15}}>{label}</span>
          </button>
        ))}
      </div>

      {/* ── Calendar ── */}
      <div style={{margin:'0 16px 28px'}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14}}>
          <button onClick={prevMonth} style={{background:'none',border:'none',color:'var(--text2)',fontSize:22,cursor:'pointer',padding:'2px 10px',lineHeight:1}}>‹</button>
          <div style={{fontFamily:'var(--font-display)', fontWeight:700, fontSize:17, letterSpacing:'0.04em'}}>{MONTHS[calMonth]} {calYear}</div>
          <button onClick={nextMonth} style={{background:'none',border:'none',color:'var(--text2)',fontSize:22,cursor:'pointer',padding:'2px 10px',lineHeight:1}}>›</button>
        </div>
        <div className="cal-grid">
          {['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=><div key={d} className="cal-dow">{d}</div>)}
          {calDays().map((cell,i) => {
            if (!cell.cur) return <div key={i} className="cal-day other-month">{cell.d}</div>;
            const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
            const hasLog = !!sessionsByDate[ds];
            const isToday = ds===todayStr;
            return (
              <div key={i} className={`cal-day${hasLog?' has-log':''}${isToday?' today':''}`}
                onClick={()=>hasLog && setCalModal(ds)}>
                {cell.d}
              </div>
            );
          })}
        </div>
        <div style={{marginTop:10, display:'flex', gap:16, justifyContent:'center'}}>
          <div style={{display:'flex', alignItems:'center', gap:5, fontSize:11, color:'var(--text3)', fontFamily:'var(--font-mono)'}}>
            <div style={{width:6,height:6,background:'var(--accent)',borderRadius:'50%'}}></div> session logged
          </div>
          <div style={{display:'flex', alignItems:'center', gap:5, fontSize:11, color:'var(--text3)', fontFamily:'var(--font-mono)'}}>
            <div style={{width:16,height:16,borderRadius:6,border:'1px solid rgba(200,255,0,0.4)',display:'inline-block'}}></div> today
          </div>
        </div>
      </div>

      {/* ── Recent sessions ── */}
      {data.sessions.length > 0 && (
        <div style={{margin:'0 16px'}}>
          <div style={{fontFamily:'var(--font-display)', fontWeight:600, fontSize:12, letterSpacing:'0.09em', color:'var(--text3)', marginBottom:10}}>RECENT SESSIONS</div>
          {[...data.sessions].reverse().slice(0,5).map(s => (
            <div key={s.id} onClick={()=>setCalModal(toDateStr(s.date))}
              style={{display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:'1px solid var(--border)', cursor:'pointer'}}>
              <div style={{fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text3)', minWidth:68}}>{fmtShort(s.date)}</div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontFamily:'var(--font-display)', fontWeight:600, fontSize:14, color:'var(--accent)'}}>
                  Day {s.dayNum}{data.routine[s.dayNum]?.name ? ` · ${data.routine[s.dayNum].name}` : ''}
                </div>
                <div style={{fontSize:12, color:'var(--text3)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                  {(s.entries||[]).map(e=>(data.routine[s.dayNum]?.exercises||[]).find(x=>x.id===e.exerciseId)?.name).filter(Boolean).join(' · ')}
                </div>
              </div>
              <div style={{color:'var(--text3)', fontSize:16, flexShrink:0}}>›</div>
            </div>
          ))}
        </div>
      )}

      {/* ── Modals ── */}
      {dayPickOpen && (
        <div className="modal-backdrop" onClick={()=>setDayPickOpen(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">Which day?</div>
            <div className="modal-sub">Choose the routine day you're training today.</div>
            {dayNums.map(d => (
              <button key={d} onClick={()=>startDraft(d)} style={{
                width:'100%', display:'flex', flexDirection:'column', alignItems:'flex-start',
                background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:10,
                padding:'14px 16px', marginBottom:10, cursor:'pointer', gap:3
              }}>
                <span style={{fontFamily:'var(--font-display)', fontWeight:700, fontSize:17, letterSpacing:'0.04em', color:'var(--text)'}}>
                  Day {d}{data.routine[d]?.name ? ` — ${data.routine[d].name}` : ''}
                </span>
                <span style={{fontFamily:'var(--font-body)', fontSize:13, color:'var(--text3)'}}>
                  {(data.routine[d]?.exercises||[]).map(e=>e.name).join(', ')}

              </button>
            ))}
            <button className="btn btn-ghost" style={{width:'100%', padding:'12px'}} onClick={()=>setDayPickOpen(false)}>Cancel</button>
          </div>
        </div>
      )}

      {workoutOpen && data.draftSession && (
        <WorkoutModal
          data={data}
          draft={data.draftSession}
          getLatest={getLatest}
          onUpdate={updateDraftEntry}
          onSave={commitSession}
          onDiscard={discardDraft}
          onClose={()=>setWorkoutOpen(false)}
        />
      )}

      {calModal && (
        <DayLogModal
          dateStr={calModal}
          sessions={sessionsByDate[calModal]||[]}
          data={data}
          persist={persist}
          showToast={showToast}
          onClose={()=>setCalModal(null)}
        />
      )}

      {dataModal && (
        <DataModal data={data} persist={persist} showToast={showToast} onClose={()=>setDataModal(false)} />
      )}
    </div>
  );
}

// ── Workout Modal ─────────────────────────────────────────────────────────────
function WorkoutModal({ data, draft, getLatest, onUpdate, onSave, onDiscard, onClose }) {
  const exercises = data.routine[draft.dayNum]?.exercises || [];
  const dayName   = data.routine[draft.dayNum]?.name;
  function getEntry(exId) { return draft.entries.find(e=>e.exerciseId===exId)||{}; }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle" />
        <div style={{marginBottom:20}}>
          <div style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--accent)', letterSpacing:'0.09em', marginBottom:4}}>● EDITING LOG</div>
          <div className="modal-title">Day {draft.dayNum}{dayName?` — ${dayName}`:''}</div>
          <div className="modal-sub">Log what you actually did. "Last" shows your most recent entry for this exercise.</div>
        </div>

        {exercises.map(ex => {
          const entry  = getEntry(ex.id);
          const latest = getLatest(ex.id, draft.dayNum);
          return (
            <div key={ex.id} className="exercise-item" style={{marginBottom:12}}>
              <div className="exercise-name">{ex.name}</div>
              <div className="exercise-meta" style={{marginBottom:10}}>
                <span className="pill">Range: {ex.minSets}–{ex.maxSets} sets · {ex.minReps}–{ex.maxReps} reps</span>
                {latest && <span className="pill accent">Last: {latest.sets}×{latest.reps} @{latest.weight ?? 0}kg</span>}
              </div>
              <div className="form-grid-3">
                <div><label>Sets</label>
                  <Stepper value={entry.sets??ex.minSets} min={0} max={ex.maxSets+5} onChange={v=>onUpdate(ex.id,'sets',v)} /></div>
                <div><label>Reps</label>
                  <Stepper value={entry.reps??ex.minReps} min={0} max={ex.maxReps+20} onChange={v=>onUpdate(ex.id,'reps',v)} /></div>
                <div><label>kg</label>
                  <Stepper value={entry.weight??0} step={2.5} onChange={v=>onUpdate(ex.id,'weight',v)} /></div>
              </div>
            </div>
          );
        })}

        <button className="btn btn-accent" style={{width:'100%',padding:'15px',fontSize:'16px',marginTop:8,borderRadius:10}} onClick={onSave}>
          Save Workout
        </button>
        <button className="btn btn-ghost" style={{width:'100%',padding:'12px',marginTop:10}} onClick={onClose}>
          Keep editing later
        </button>
        <button className="btn btn-danger" style={{width:'100%',padding:'10px',marginTop:6,fontSize:'13px'}} onClick={onDiscard}>
          Discard log
        </button>
      </div>
    </div>
  );
}

// ── Calendar Day Log Modal ────────────────────────────────────────────────────
function DayLogModal({ dateStr, sessions, data, persist, showToast, onClose }) {
  const [editingSession, setEditingSession] = useState(null); // session object
  const [confirmDelete, setConfirmDelete]   = useState(null); // session id

  const [y,m,d] = dateStr.split('-').map(Number);
  const label = new Date(y,m-1,d).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  function deleteSession(id) {
    persist({...data, sessions: data.sessions.filter(s=>s.id!==id)});
    showToast('Session deleted');
    setConfirmDelete(null);
    // if no sessions left on this date, close
    if (sessions.filter(s=>s.id!==id).length===0) onClose();
  }

  function saveEditedSession(sessionId, newEntries) {
    persist({...data, sessions: data.sessions.map(s => s.id===sessionId ? {...s, entries:newEntries} : s)});
    showToast('Session updated');
    setEditingSession(null);
  }

  if (editingSession) {
    return (
      <EditSessionModal
        session={editingSession}
        data={data}
        onSave={(entries) => saveEditedSession(editingSession.id, entries)}
        onClose={() => setEditingSession(null)}
      />
    );
  }

  return (
    <div className="modal-backdrop center" onClick={onClose}>
      <div className="modal center-modal" onClick={e=>e.stopPropagation()}>
        <div style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--accent2)', letterSpacing:'0.07em', marginBottom:10}}>{label.toUpperCase()}</div>
        {sessions.length===0 ? (
          <div style={{color:'var(--text3)', textAlign:'center', padding:'20px 0'}}>No sessions logged.</div>
        ) : sessions.map(s => {
          const dayName = data.routine[s.dayNum]?.name;
          const exList  = data.routine[s.dayNum]?.exercises||[];
          return (
            <div key={s.id} style={{marginBottom:16}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
                <div style={{fontFamily:'var(--font-display)', fontWeight:700, fontSize:20, color:'var(--accent)', letterSpacing:'0.04em'}}>
                  Day {s.dayNum}{dayName?` — ${dayName}`:''}
                </div>
                <div style={{display:'flex', gap:8}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEditingSession(s)}>✏️ Edit</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDelete(s.id)}>🗑</button>
                </div>
              </div>
              {(s.entries||[]).map(entry => {
                const ex = exList.find(x=>x.id===entry.exerciseId);
                if (!ex) return null;
                return (
                  <div key={entry.exerciseId} style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{fontSize:15, color:'var(--text)'}}>{ex.name}</div>
                    <div style={{fontFamily:'var(--font-mono)', fontSize:13, color:'var(--text2)', textAlign:'right', flexShrink:0, marginLeft:12}}>
                      {entry.sets}×{entry.reps}
                      {entry.weight!=null?<span style={{color:'var(--accent2)'}}> @{entry.weight}kg</span>:null}
                    </div>
                  </div>
                );
              })}

              {/* Inline delete confirm */}
              {confirmDelete===s.id && (
                <div style={{marginTop:12, padding:'12px', background:'rgba(255,77,77,0.08)', border:'1px solid rgba(255,77,77,0.25)', borderRadius:10}}>
                  <div style={{fontSize:13, color:'var(--text2)', marginBottom:10}}>Delete this session? This can't be undone.</div>
                  <div style={{display:'flex', gap:8}}>
                    <button className="btn btn-danger btn-sm" style={{flex:1}} onClick={()=>deleteSession(s.id)}>Yes, delete</button>
                    <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>setConfirmDelete(null)}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        <button className="btn btn-ghost" style={{width:'100%',padding:'11px',marginTop:8}} onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

// ── Edit Session Modal ────────────────────────────────────────────────────────
function EditSessionModal({ session, data, onSave, onClose }) {
  const exercises = data.routine[session.dayNum]?.exercises || [];
  const dayName   = data.routine[session.dayNum]?.name;
  const fmtDate   = new Date(session.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

  // Initialise local editable entries from existing session data
  const [entries, setEntries] = useState(() =>
    exercises.map(ex => {
      const existing = session.entries?.find(e=>e.exerciseId===ex.id);
      return { exerciseId:ex.id, sets:existing?.sets??ex.minSets, reps:existing?.reps??ex.minReps, weight:existing?.weight??0 };
    })
  );

  function update(exId, field, val) {
    setEntries(prev => prev.map(e => e.exerciseId===exId ? {...e,[field]:val} : e));
  }
  function getEntry(exId) { return entries.find(e=>e.exerciseId===exId)||{}; }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle" />
        <div style={{marginBottom:20}}>
          <div style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--accent2)', letterSpacing:'0.09em', marginBottom:4}}>✏️ EDITING SESSION · {fmtDate.toUpperCase()}</div>
          <div className="modal-title">Day {session.dayNum}{dayName?` — ${dayName}`:''}</div>
          <div className="modal-sub">Adjust any values and save.</div>
        </div>

        {exercises.map(ex => {
          const entry = getEntry(ex.id);
          return (
            <div key={ex.id} className="exercise-item" style={{marginBottom:12}}>
              <div className="exercise-name">{ex.name}</div>
              <div className="exercise-meta" style={{marginBottom:10}}>
                <span className="pill">Range: {ex.minSets}–{ex.maxSets} sets · {ex.minReps}–{ex.maxReps} reps</span>
              </div>
              <div className="form-grid-3">
                <div><label>Sets</label>
                  <Stepper value={entry.sets??ex.minSets} min={0} max={ex.maxSets+5} onChange={v=>update(ex.id,'sets',v)} /></div>
                <div><label>Reps</label>
                  <Stepper value={entry.reps??ex.minReps} min={0} max={ex.maxReps+20} onChange={v=>update(ex.id,'reps',v)} /></div>
                <div><label>kg</label>
                  <Stepper value={entry.weight??0} step={2.5} onChange={v=>update(ex.id,'weight',v)} /></div>
              </div>
            </div>
          );
        })}

        <button className="btn btn-accent" style={{width:'100%',padding:'15px',fontSize:'16px',marginTop:8,borderRadius:10}} onClick={()=>onSave(entries)}>
          Save Changes
        </button>
        <button className="btn btn-ghost" style={{width:'100%',padding:'12px',marginTop:10}} onClick={onClose}>
          Cancel
        </button>
      </div>
    </div>
  );
}

// ── Data Modal ────────────────────────────────────────────────────────────────
function DataModal({ data, persist, showToast, onClose }) {
  const fileRef = useRef();
  const [preview, setPreview] = useState(null);
  const [err, setErr] = useState('');
  function handleFile(e) {
    const f = e.target.files[0]; if(!f) return;
    setErr(''); setPreview(null);
    const r = new FileReader();
    r.onload = ev => {
      try {
        const p = parseCSV(ev.target.result);
        const dc=Object.keys(p.routine).length, sc=p.sessions.length;
        if(!dc&&!sc){setErr('No valid data found.');return;}
        setPreview({p,dc,sc});
      } catch { setErr('Could not parse file.'); }
    };
    r.readAsText(f);
  }
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-title">Data Backup</div>
        <div style={{marginBottom:14,padding:'14px',background:'var(--surface2)',borderRadius:10,border:'1px solid var(--border)'}}>
          <div style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:13,letterSpacing:'0.05em',marginBottom:6}}>EXPORT</div>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Download all your data as a CSV backup.</div>
          <button className="btn btn-accent" style={{width:'100%'}} onClick={()=>{exportCSV(data);showToast('Exported!');}}>↓ Export CSV</button>
        </div>
        <div style={{padding:'14px',background:'var(--surface2)',borderRadius:10,border:'1px solid var(--border)'}}>
          <div style={{fontFamily:'var(--font-display)',fontWeight:600,fontSize:13,letterSpacing:'0.05em',marginBottom:6}}>IMPORT</div>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Restore from a backup. <span style={{color:'var(--danger)'}}>Replaces all data.</span></div>
          <button className="btn btn-ghost" style={{width:'100%'}} onClick={()=>fileRef.current.click()}>↑ Choose CSV</button>
          <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={handleFile} />
          {err && <div style={{color:'var(--danger)',fontSize:13,marginTop:10}}>{err}</div>}
          {preview && (
            <div style={{marginTop:12,padding:'12px',background:'var(--surface3)',borderRadius:8}}>
              <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>
                Found <b style={{color:'var(--accent)'}}>{preview.dc} days</b> and <b style={{color:'var(--accent)'}}>{preview.sc} sessions</b>.
              </div>
              <button className="btn btn-accent" style={{width:'100%'}} onClick={()=>{persist({...INITIAL,...preview.p});onClose();showToast('Imported!');}}>Confirm Import</button>
            </div>
          )}
        </div>
        <button className="btn btn-ghost" style={{width:'100%',padding:'13px',marginTop:12}} onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ROUTINE PAGE
// ══════════════════════════════════════════════════════════════════════════════
function RoutinePage({ data, persist, showToast, goBack }) {
  const [addDayOpen,  setAddDayOpen]  = useState(false);
  const [addExDay,    setAddExDay]    = useState(null);
  const [editDayNum,  setEditDayNum]  = useState(null);
  const dayNums = Object.keys(data.routine).sort();

  function addDay(name) {
    const nums = Object.keys(data.routine).map(Number);
    const next = nums.length ? Math.max(...nums)+1 : 1;
    if (next>5) return;
    persist({...data, routine:{...data.routine,[String(next)]:{name,exercises:[]}}});
    setAddDayOpen(false); showToast(`Day ${next} added`);
  }
  function removeDay(d) {
    const r={...data.routine}; delete r[d];
    const ren={}; Object.keys(r).sort().forEach((k,i)=>{ren[String(i+1)]=r[k];});
    persist({...data, routine:ren}); showToast('Day removed');
  }
  function renameDay(d,name) {
    persist({...data, routine:{...data.routine,[d]:{...data.routine[d],name}}});
    setEditDayNum(null);
  }
  function addExercise(d,ex) {
    const day=data.routine[d]||{name:'',exercises:[]};
    persist({...data, routine:{...data.routine,[d]:{...day,exercises:[...day.exercises,{...ex,id:uuid()}]}}});
    setAddExDay(null); showToast('Exercise added');
  }
  function removeEx(d,exId) {
    const day=data.routine[d];
    persist({...data, routine:{...data.routine,[d]:{...day,exercises:day.exercises.filter(e=>e.id!==exId)}}});
    showToast('Removed');
  }

  return (
    <div className="page">
      <div className="back-header">
        <button className="back-btn" onClick={goBack}>←</button>
        <h2>My Routine</h2>
        {dayNums.length<5 && <button className="btn btn-accent btn-sm" style={{marginLeft:'auto'}} onClick={()=>setAddDayOpen(true)}>+ Day</button>}
      </div>

      {dayNums.length===0 && (
        <div style={{textAlign:'center',padding:'60px 24px',color:'var(--text3)'}}>
          <div style={{fontSize:44,marginBottom:14}}>📋</div>
          <p style={{fontSize:16}}>No days yet.<br/>Add your first training day above.</p>
        </div>
      )}

      {dayNums.map(d => (
        <div key={d} className="day-section">
          <div className="day-label">
            <span>
              Day {d}
              {data.routine[d]?.name && <span style={{fontWeight:400, color:'var(--text2)', fontSize:15}}> — {data.routine[d].name}</span>}
            </span>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setEditDayNum(d)}>✏️</button>
              <button className="btn btn-danger btn-sm" onClick={()=>removeDay(d)}>✕</button>
            </div>
          </div>
          {(data.routine[d]?.exercises||[]).map(ex => (
            <div key={ex.id} className="exercise-item">
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                <div>
                  <div className="exercise-name">{ex.name}</div>
                  <div className="exercise-meta">
                    <span className="pill accent">{ex.minSets}–{ex.maxSets} sets</span>
                    <span className="pill info">{ex.minReps}–{ex.maxReps} reps</span>
                  </div>
                </div>
                <button className="btn btn-danger btn-sm" style={{marginLeft:8,flexShrink:0}} onClick={()=>removeEx(d,ex.id)}>✕</button>
              </div>
            </div>
          ))}
          <button className="btn btn-ghost" style={{width:'100%',marginTop:4}} onClick={()=>setAddExDay(d)}>+ Add exercise to Day {d}</button>
        </div>
      ))}

      {addDayOpen  && <AddDayModal nextDay={dayNums.length+1} onClose={()=>setAddDayOpen(false)} onSave={addDay} />}
      {addExDay    && <AddExerciseModal dayNum={addExDay} onClose={()=>setAddExDay(null)} onSave={ex=>addExercise(addExDay,ex)} />}
      {editDayNum  && <EditDayModal dayNum={editDayNum} currentName={data.routine[editDayNum]?.name||''} onClose={()=>setEditDayNum(null)} onSave={n=>renameDay(editDayNum,n)} />}
    </div>
  );
}

function AddDayModal({ nextDay, onClose, onSave }) {
  const [name,setName]=useState('');
  return (
    <div className="modal-backdrop" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-handle" />
      <div className="modal-title">Add Day {nextDay}</div>
      <div className="form-row"><label>Day Name (optional)</label><input placeholder="e.g. Push Day, Legs…" value={name} onChange={e=>setName(e.target.value)} /></div>
      <button className="btn btn-accent" style={{width:'100%',padding:'14px'}} onClick={()=>onSave(name)}>Add Day</button>
      <button className="btn btn-ghost" style={{width:'100%',padding:'14px',marginTop:10}} onClick={onClose}>Cancel</button>
    </div></div>
  );
}

function EditDayModal({ dayNum, currentName, onClose, onSave }) {
  const [name,setName]=useState(currentName);
  return (
    <div className="modal-backdrop" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-handle" />
      <div className="modal-title">Rename Day {dayNum}</div>
      <div className="form-row"><label>Name</label><input value={name} onChange={e=>setName(e.target.value)} /></div>
      <button className="btn btn-accent" style={{width:'100%',padding:'14px'}} onClick={()=>onSave(name)}>Save</button>
      <button className="btn btn-ghost" style={{width:'100%',padding:'14px',marginTop:10}} onClick={onClose}>Cancel</button>
    </div></div>
  );
}

function AddExerciseModal({ dayNum, onClose, onSave }) {
  const [name,setName]=useState('');
  const [minSets,setMinSets]=useState(3);
  const [maxSets,setMaxSets]=useState(4);
  const [minReps,setMinReps]=useState(8);
  const [maxReps,setMaxReps]=useState(12);
  const [err,setErr]=useState('');
  const PRESETS=['Bench Press','Squat','Deadlift','OHP','Pull-ups','Barbell Row','Lunges','Bicep Curls','Tricep Dips','Lat Pulldown','Leg Press','Cable Fly','Incline Press','Romanian Deadlift'];
  function submit() {
    if(!name.trim()){setErr('Name required');return;}
    if(minSets>maxSets){setErr('Min sets > max');return;}
    if(minReps>maxReps){setErr('Min reps > max');return;}
    onSave({name:name.trim(),minSets,maxSets,minReps,maxReps});
  }
  return (
    <div className="modal-backdrop" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-handle" />
      <div className="modal-title">Add Exercise</div>
      <div className="modal-sub">Day {dayNum}</div>
      <div className="form-row">
        <label>Name</label>
        <input placeholder="e.g. Bench Press" value={name} onChange={e=>{setName(e.target.value);setErr('');}} />
        <div className="tag-row">{PRESETS.map(p=><span key={p} className={`tag${name===p?' selected':''}`} onClick={()=>setName(p)}>{p}</span>)}</div>
      </div>
      <div className="form-row">
        <label>Sets Range</label>
        <div className="form-grid">
          <div><label>Min</label><Stepper value={minSets} min={1} max={maxSets} onChange={setMinSets} /></div>
          <div><label>Max</label><Stepper value={maxSets} min={minSets} max={10} onChange={setMaxSets} /></div>
        </div>
      </div>
      <div className="form-row">
        <label>Reps Range</label>
        <div className="form-grid">
          <div><label>Min</label><Stepper value={minReps} min={1} max={maxReps} onChange={setMinReps} /></div>
          <div><label>Max</label><Stepper value={maxReps} min={minReps} max={50} onChange={setMaxReps} /></div>
        </div>
      </div>
      {err && <div style={{color:'var(--danger)',fontSize:13,marginBottom:12}}>{err}</div>}
      <button className="btn btn-accent" style={{width:'100%',padding:'14px'}} onClick={submit}>Add Exercise</button>
      <button className="btn btn-ghost" style={{width:'100%',padding:'14px',marginTop:10}} onClick={onClose}>Cancel</button>
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
